services:
  - type: web
    name: invoice-master-backend
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
