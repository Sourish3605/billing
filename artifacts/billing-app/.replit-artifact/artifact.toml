kind = "web"
previewPath = "/"
title = "GST Billing & Inventory"
version = "1.0.0"
id = "artifacts/billing-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23436
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/billing-app run dev"

[services.env]
PORT = "23436"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/billing-app", "run", "build"]
publicDir = "artifacts/billing-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
